name: Build and Release Firmware

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:

jobs:
  build:
    name: Build Firmware (${{ matrix.target }})
    runs-on: ubuntu-latest
    container:
      image: espressif/esp-matter:latest
    strategy:
      matrix:
        target: [esp32c3, esp32c6]
      fail-fast: false
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build Firmware
        shell: bash
        run: |
          # Source ESP-IDF and ESP-Matter environments using container variables
          source $IDF_PATH/export.sh
          source $ESP_MATTER_PATH/export.sh
          
          # Set target based on matrix
          idf.py set-target ${{ matrix.target }}
          
          # Compile the main Matter project (ota_0)
          idf.py build
          
          # Prepare output directory
          mkdir -p dist
          # The generated .bin file is what gets flashed to ota_0
          cp build/matter_lock_homekit.bin dist/matter_lock_homekit_ota0_${{ matrix.target }}.bin
          cp build/partition_table/partition-table.bin dist/partition-table_${{ matrix.target }}.bin
          cp build/bootloader/bootloader.bin dist/bootloader_${{ matrix.target }}.bin
          
          # Compile the HomeKit provisioner (ota_1)
          cd provisioner
          idf.py set-target ${{ matrix.target }}
          idf.py build
          # The generated .bin file is what gets flashed to ota_1
          cp build/homekey_provisioner.bin ../dist/provisioner_ota1_${{ matrix.target }}.bin
          cd ..
          
          # Generate a single merged binary for easy flashing on new boards
          esptool.py --chip ${{ matrix.target }} merge_bin -o dist/matter_lock_homekit_full_${{ matrix.target }}.bin \
            0x0 dist/bootloader_${{ matrix.target }}.bin \
            0xC000 dist/partition-table_${{ matrix.target }}.bin \
            0x20000 dist/matter_lock_homekit_ota0_${{ matrix.target }}.bin \
            0x210000 dist/provisioner_ota1_${{ matrix.target }}.bin

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}-firmware
          path: dist/

      - name: Publish to GitHub Releases
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          # On main branch, update a 'latest' rolling release; on tags, use the tag name.
          tag_name: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || 'latest' }}
          name: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || 'Latest Automatic Build' }}
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/v') }}
